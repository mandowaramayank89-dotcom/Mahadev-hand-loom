<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahadev Hand Loom</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #f2f2f2; padding: 20px; text-align: center; }
        nav { margin: 20px 0; }
        nav a { margin: 0 15px; text-decoration: none; color: #333; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; }
        .product { margin: 15px; border: 1px solid #ddd; border-radius: 5px; padding: 10px; }
        img { max-width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Mahadev Hand Loom</h1>
        <nav>
            <a href="#fridge-covers">Fridge Covers</a>
            <a href="#sofa-covers">Sofa Covers</a>
            <a href="#roti-covers">Roti Covers</a>
        </nav>
    </header>
    <main>
        <section id="fridge-covers" class="gallery">
            <h2>Fridge Covers</h2>
            <div class="product"><img src="path/to/fridge_cover1.jpg" alt="Fridge Cover 1"><p>Fridge Cover 1 - $20</p></div>
            <div class="product"><img src="path/to/fridge_cover2.jpg" alt="Fridge Cover 2"><p>Fridge Cover 2 - $25</p></div>
        </section>
        <section id="sofa-covers" class="gallery">
            <h2>Sofa Covers</h2>
            <div class="product"><img src="path/to/sofa_cover1.jpg" alt="Sofa Cover 1"><p>Sofa Cover 1 - $30</p></div>
        </section>
        <section id="roti-covers" class="gallery">
            <h2>Roti Covers</h2>
            <div class="product"><img src="path/to/roti_cover1.jpg" alt="Roti Cover 1"><p>Roti Cover 1 - $15</p></div>
        </section>
    </main>
</body>
</html>
